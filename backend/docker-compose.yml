version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assetrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetrix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-secret-change-me}
      POSTGRES_DB: assetrix
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assetrix -d assetrix']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: assetrix-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev-redis-secret-change-me}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-dev-redis-secret-change-me}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetrix-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://assetrix:${POSTGRES_PASSWORD:-dev-secret-change-me}@postgres:5432/assetrix?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev-redis-secret-change-me}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-strong-random-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-to-another-strong-random-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  upload_data:
